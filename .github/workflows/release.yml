name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: "22"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run renderer E2E tests
        run: npm run e2e:renderer

      - name: Build renderer and Electron files
        run: npm run build

  build:
    name: Build ${{ matrix.platform }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-latest
            script: npm run dist:mac -- -c.mac.forceCodeSigning=true
            artifact_name: timebro-macos
            artifact_paths: |
              release/*.dmg
              release/*.zip
              release/*.blockmap
              release/latest-mac.yml
          - platform: windows
            os: windows-latest
            script: npm run dist:win
            artifact_name: timebro-windows
            artifact_paths: |
              release/*.exe
              release/*.zip
              release/*.blockmap
              release/latest.yml
          - platform: linux
            os: ubuntu-latest
            script: npm run dist:linux
            artifact_name: timebro-linux
            artifact_paths: |
              release/*.AppImage
              release/*.deb
              release/*.tar.gz
              release/*.blockmap
              release/latest-linux.yml
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Linux packaging dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools rpm

      - name: Install dependencies
        run: npm ci

      - name: Check macOS signing secrets
        if: matrix.platform == 'macos'
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=()
          for name in \
            MAC_CSC_LINK \
            MAC_CSC_KEY_PASSWORD \
            APPLE_API_KEY_BASE64 \
            APPLE_API_KEY_ID \
            APPLE_API_ISSUER \
            APPLE_TEAM_ID
          do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing macOS signing GitHub secrets: %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Prepare App Store Connect API key
        if: matrix.platform == 'macos'
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          api_key_path="$RUNNER_TEMP/apple-api-key.p8"
          node -e 'require("fs").writeFileSync(process.argv[1], Buffer.from(process.env.APPLE_API_KEY_BASE64, "base64"))' "$api_key_path"
          chmod 600 "$api_key_path"
          echo "APPLE_API_KEY=$api_key_path" >> "$GITHUB_ENV"

      - name: Build signed macOS package
        if: matrix.platform == 'macos'
        run: ${{ matrix.script }}
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build desktop package
        if: matrix.platform != 'macos'
        run: ${{ matrix.script }}

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error

  snap:
    name: Build Snap (amd64)
    needs: test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Stage Snapcraft project
        run: npm run dist:snap:stage

      - name: Build Snap
        id: snapcraft
        uses: snapcore/action-build@v1
        with:
          path: release/__snap-amd64

      - name: Upload Snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: timebro-snap
          path: ${{ steps.snapcraft.outputs.snap }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs:
      - build
      - snap
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(release-assets/*)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets were downloaded."
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${assets[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${assets[@]}" \
              --draft \
              --title "$TAG_NAME" \
              --generate-notes \
              --verify-tag
          fi

  publish_snap:
    name: Publish Snap to edge
    needs: snap
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && vars.SNAP_STORE_PUBLISH_ENABLED == 'true'
    steps:
      - name: Download Snap artifact
        uses: actions/download-artifact@v4
        with:
          name: timebro-snap
          path: release

      - name: Locate Snap
        id: snap
        run: |
          snap_path="$(find release -maxdepth 1 -type f -name '*.snap' -print -quit)"
          if [ -z "$snap_path" ]; then
            echo "No Snap artifact was downloaded."
            exit 1
          fi
          echo "path=$snap_path" >> "$GITHUB_OUTPUT"

      - name: Upload and release to edge
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.snap.outputs.path }}
          release: edge
