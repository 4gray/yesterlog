<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="TimeBro app icon">
  <defs>
    <linearGradient id="base" x1="178" y1="108" x2="846" y2="930" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1f85ff"/>
